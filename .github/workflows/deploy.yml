name: Deploy

on: workflow_call

# Pages allows a single concurrent deployment. Queue rather than cancel, so a
# release deploy is never dropped half-way.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Bundle
        run: bash bundle.sh

      - name: Generate basic HTML index page
        uses: docker://pandoc/core:3.5
        with:
          args: >-
            --standalone
            --metadata title="war10ck"
            --from=markdown
            --to=html5
            --output=dist/index.html
            dist/README.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: upload
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
