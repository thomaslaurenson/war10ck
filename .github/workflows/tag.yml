name: Tag

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
  test:
    uses: ./.github/workflows/test.yml
  publish:
    needs: [lint, test]
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    permissions:
      contents: write
      pages: write
      id-token: write
