; Polybar configuration

[colors]
background = #0a0a0a
background-alt = #1a1a1a
foreground = #f8f8f8
foreground-dim = #666666
primary = #00FF00
alert = #ff0000

[bar/top]
monitor = ${env:MONITOR:}
wm-name = top
wm-stack = false

override-redirect = false

width = 100%
height = 32
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-size = 0

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 1

font-0 = monospace:size=10;2

modules-left = workspaces
modules-center = date
modules-right = cpu memory pulseaudio wlan eth battery powermenu

tray-position = none
tray-padding = 4

cursor-click = pointer
cursor-scroll = ns-resize

[module/workspaces]
type = custom/script
exec = ~/.war10ck/polybar/workspaces.sh
tail = true

[module/date]
type = internal/date
interval = 1
date = %a %b %d
time = %H:%M
label = %date%  %time%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "MEM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/pulseaudio]
type = internal/pulseaudio
interval = 5
format-volume = VOL <label-volume>
label-volume = %percentage%%
label-muted = VOL muted
label-muted-foreground = ${colors.foreground-dim}
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pavucontrol

[module/wlan]
type = internal/network
interface = ${env:WIFI_IFACE:}
interval = 3
format-connected-prefix = "WIFI "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %essid%
format-disconnected =

[module/eth]
type = internal/network
interface = ${env:ETH_IFACE:}
interval = 3
format-connected-prefix = "ETH "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %local_ip%
format-disconnected =

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <label-charging>
format-charging-prefix = "BAT "
format-charging-prefix-foreground = ${colors.primary}
label-charging = %percentage%%+

format-discharging = <label-discharging>
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.primary}
label-discharging = %percentage%%

format-full = <label-full>
format-full-prefix = "BAT "
format-full-prefix-foreground = ${colors.primary}
label-full = 100%

[module/powermenu]
type = custom/text
content = PWR
content-foreground = ${colors.alert}
content-padding = 2
click-left = i3-nagbar -t warning -m 'Power?' -B 'Shutdown' 'systemctl poweroff' -B 'Reboot' 'systemctl reboot' -B 'Suspend' 'systemctl suspend' -B 'Lock' 'i3lock'
